<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">G1 XR teleoperation pipeline</title>
  <desc id="desc">Meta Quest tracking passes through a Unity XR client and a custom Python bridge that integrates Unitree's official G1 inverse kinematics and Dex3 retargeting. Commands drive a simulated G1 and visual feedback returns to the operator.</desc>
  <defs>
    <style>
      .bg{fill:var(--diagram-bg,#0b0b0a)}.card{fill:var(--diagram-panel,#10100e);stroke:var(--diagram-line,#3b3934);stroke-width:1.5}.media{fill:var(--diagram-media,#080807);stroke:var(--diagram-line,#292824);stroke-width:1}.media-clear{fill:none;stroke:none}.rule{stroke:var(--diagram-line,#37352f);stroke-width:1}.eyebrow{fill:var(--diagram-accent,#d96a3a);font:700 12px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:1.6px}.title{fill:var(--diagram-text,#f3f0e8);font:650 38px Inter,Arial,sans-serif;letter-spacing:-1px}.card-title{fill:var(--diagram-text,#f3f0e8);font:650 25px Inter,Arial,sans-serif;letter-spacing:-.4px}.body{fill:var(--diagram-muted,#aca79d);font:400 15px Inter,Arial,sans-serif}.mono{fill:var(--diagram-quiet,#77736b);font:600 11px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:1.05px}.module-title{fill:var(--diagram-text,#f3f0e8);font:650 20px Inter,Arial,sans-serif}.module-body{fill:var(--diagram-muted,#aca79d);font:400 13px Inter,Arial,sans-serif}.arrow{stroke:var(--diagram-accent,#d96a3a);stroke-width:3;fill:none}.feedback{stroke:var(--diagram-quiet,#817d74);stroke-width:1.5;stroke-dasharray:7 8;fill:none}.wrapper{fill:var(--diagram-accent-soft,#130e0c);stroke:var(--diagram-accent,#9a4d2d);stroke-width:1.5}.unitree{fill:var(--diagram-panel-2,#151513);stroke:var(--diagram-line,#4a4741);stroke-width:1.5}.accent-fill{fill:var(--diagram-accent,#d96a3a)}.feedback-fill{fill:var(--diagram-quiet,#817d74)}.boundary{fill:var(--diagram-accent-soft,#100d0b);stroke:var(--diagram-accent,#60311f);stroke-width:1.5}
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path class="accent-fill" d="M0 0L10 5L0 10z"/></marker>
    <marker id="feedback-head" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path class="feedback-fill" d="M0 0L10 5L0 10z"/></marker>
    <clipPath id="quest-clip"><rect x="72" y="304" width="272" height="288" rx="2"/></clipPath>
    <clipPath id="unity-clip"><rect x="440" y="304" width="302" height="288" rx="2"/></clipPath>
    <clipPath id="g1-clip"><rect x="1216" y="304" width="312" height="288" rx="2"/></clipPath>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="eyebrow" x="48" y="58">SYSTEM ARCHITECTURE</text>
  <text class="title" x="48" y="105">XR teleoperation pipeline</text>
  <line class="rule" x1="48" y1="136" x2="1552" y2="136"/>

  <rect class="card" x="48" y="190" width="320" height="450" rx="3"/>
  <text class="eyebrow" x="72" y="227">01 / INPUT</text>
  <text class="card-title" x="72" y="270">Meta Quest 3S</text>
  <rect class="media-clear" x="72" y="304" width="272" height="288" rx="2"/>
  <image x="72" y="304" width="272" height="288" xlink:href="quest-3s-diagram-render.png?v=20260714-1" href="quest-3s-diagram-render.png?v=20260714-1" preserveAspectRatio="xMidYMid meet" clip-path="url(#quest-clip)"/>

  <rect class="card" x="416" y="190" width="350" height="450" rx="3"/>
  <text class="eyebrow" x="440" y="227">02 / CLIENT</text>
  <text class="card-title" x="440" y="270">Unity XR</text>
  <rect class="media" x="440" y="304" width="302" height="288" rx="2"/>
  <image x="440" y="304" width="302" height="288" xlink:href="g1-teleoperation-frame-04s.jpg?v=20260714-1" href="g1-teleoperation-frame-04s.jpg?v=20260714-1" preserveAspectRatio="xMidYMid slice" clip-path="url(#unity-clip)"/>

  <rect class="card" x="814" y="190" width="330" height="450" rx="3"/>
  <text class="eyebrow" x="838" y="227">03 / BACKEND</text>
  <text class="card-title" x="838" y="270">Custom Python bridge</text>
  <rect class="media" x="838" y="304" width="282" height="288" rx="2"/>
  <rect class="wrapper" x="862" y="330" width="234" height="236" rx="4"/>
  <text class="eyebrow" x="882" y="359">OUR INTEGRATION</text>
  <rect class="unitree" x="882" y="383" width="194" height="135" rx="3"/>
  <text class="mono" x="902" y="411">UNITREE OFFICIAL</text>
  <text class="module-title" x="902" y="446">G1 arm IK</text>
  <line class="rule" x1="902" y1="461" x2="1056" y2="461"/>
  <text class="module-title" x="902" y="492">Dex3 retargeting</text>

  <rect class="card" x="1192" y="190" width="360" height="450" rx="3"/>
  <text class="eyebrow" x="1216" y="227">04 / OUTPUT</text>
  <text class="card-title" x="1216" y="270">G1 simulation</text>
  <rect class="media-clear" x="1216" y="304" width="312" height="288" rx="2"/>
  <image x="1216" y="304" width="312" height="288" xlink:href="g1-diagram-render.png?v=20260714-1" href="g1-diagram-render.png?v=20260714-1" preserveAspectRatio="xMidYMid meet" clip-path="url(#g1-clip)"/>

  <path class="arrow" d="M368 448h48" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M766 448h48" marker-end="url(#arrowhead)"/>
  <path class="arrow" d="M1144 448h48" marker-end="url(#arrowhead)"/>

  <path class="feedback" d="M1372 640v72H208v-72" marker-end="url(#feedback-head)"/>
  <rect class="bg" x="718" y="697" width="164" height="30"/>
  <text class="mono" x="800" y="717" text-anchor="middle">VISUAL FEEDBACK</text>

  <rect class="boundary" x="48" y="784" width="1504" height="68" rx="3"/>
  <circle class="accent-fill" cx="74" cy="818" r="4"/>
  <text class="eyebrow" x="92" y="822">SIMULATION ONLY</text>
  <text class="body" x="1528" y="822" text-anchor="end">Physical robot actuation disabled</text>
</svg>
